services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
      args:
        GIT_COMMIT: ${GIT_COMMIT:-local}
    environment:
      DATABASE_URL: ${DATABASE_URL:?Define DATABASE_URL in root .env (Supabase Session pooler URI, postgresql+asyncpg://...)}
      DATABASE_SSL_VERIFY: ${DATABASE_SSL_VERIFY:-true}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_VALIDATE_SIGNATURE: ${TWILIO_VALIDATE_SIGNATURE:-false}
      WEBHOOK_BASE_URL: ${WEBHOOK_BASE_URL:-http://localhost:8000}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev-internal-key}
      # Debe coincidir con el origen del navegador (puerto publicado del servicio web).
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3001}
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      LOG_JSON: ${LOG_JSON:-false}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      GIT_COMMIT: ${GIT_COMMIT:-local}
    ports:
      - "8000:8000"
    depends_on:
      - redis

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    environment:
      BACKEND_URL: http://api:8000
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-dev-internal-key}
    ports:
      # Host 3001 por defecto para evitar choque con otro proceso en 3000 (p. ej. Next dev / Cursor).
      - "${WEB_PUBLISH_PORT:-3001}:3000"
    depends_on:
      - api

volumes:
  redis-data:
